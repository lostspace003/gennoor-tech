name: IndexNow Push

on:
  schedule:
    - cron: '0 3 */4 * *'   # 03:00 UTC, every 4 days (safety net)
  workflow_dispatch:         # manual trigger from GitHub UI / gh CLI
  workflow_run:              # auto-fire after each successful main deploy
    workflows: ['CI/CD Pipeline']
    types: [completed]
    branches: [main]

env:
  NODE_VERSION: '22.x'

jobs:
  push:
    # Only run after successful deploy, or on schedule/manual
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Wait for Azure deploy to propagate
        if: github.event_name == 'workflow_run'
        run: sleep 90

      - name: Submit sitemap to IndexNow
        run: npm run indexnow
