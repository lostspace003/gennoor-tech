name: GSC Sitemap Resubmit

on:
  schedule:
    - cron: '0 4 */4 * *'   # 04:00 UTC, every 4 days (safety net)
  workflow_dispatch:         # manual trigger
  workflow_run:              # auto-fire after each successful main deploy
    workflows: ['CI/CD Pipeline']
    types: [completed]
    branches: [main]

env:
  NODE_VERSION: '22.x'

jobs:
  resubmit:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Wait for Azure deploy to propagate
        if: github.event_name == 'workflow_run'
        run: sleep 90

      - name: Resubmit sitemap to Google Search Console
        run: npm run gsc-resubmit
        env:
          GSC_OAUTH_CLIENT_ID: ${{ secrets.GSC_OAUTH_CLIENT_ID }}
          GSC_OAUTH_CLIENT_SECRET: ${{ secrets.GSC_OAUTH_CLIENT_SECRET }}
          GSC_OAUTH_REFRESH_TOKEN: ${{ secrets.GSC_OAUTH_REFRESH_TOKEN }}
