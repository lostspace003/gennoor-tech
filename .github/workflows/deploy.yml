name: CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: gennoor-tech
  NODE_VERSION: '22.x'

jobs:
  # ── Build & Validate (runs on all branches) ──
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BLOB_URL: "/media"
          NEXT_PUBLIC_SITE_URL: "https://gennoor.com"
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_FB_PIXEL_ID: ${{ secrets.NEXT_PUBLIC_FB_PIXEL_ID }}
          NEXT_PUBLIC_LINKEDIN_PARTNER_ID: ${{ secrets.NEXT_PUBLIC_LINKEDIN_PARTNER_ID }}
          NEXT_PUBLIC_CAREER_API_URL: ${{ secrets.NEXT_PUBLIC_CAREER_API_URL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      # Only deploy on main branch (push or manual trigger)
      - name: Prepare deployment package
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          mkdir -p deploy
          cp -r .next/standalone/. deploy/
          cp -r .next/static deploy/.next/static
          cp -r public deploy/public
          echo "Deploy package contents:"
          ls -la deploy/.next/ || echo "No .next dir!"

      - name: Azure Login
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deploy

      - name: Health check
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://gennoor-tech.azurewebsites.net/)
          echo "Health check status: $STATUS"
          if [ "$STATUS" -ge 500 ]; then
            echo "::error::Health check failed with status $STATUS"
            exit 1
          fi
          echo "Deployment healthy!"
